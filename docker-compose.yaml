version: '3.8'
services:
  realitydefender-mcp-server:
    build: .
    env_file:
      - .env
    environment:
      WEB_SERVER_HOST: "0.0.0.0"
      WEB_SERVER_PORT: "8000"
      MCP_HOST: "0.0.0.0"
      MCP_PORT: "8001"
    ports:
      - "8000:8000"  # Upload web server
      - "8001:8001"  # MCP streamable-http transport
